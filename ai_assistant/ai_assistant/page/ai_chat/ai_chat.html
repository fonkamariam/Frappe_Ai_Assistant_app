<div class="ai-chat-wrapper" id="ai-chat-wrapper">

    <!-- ===== SIDEBAR ===== -->
    <div class="ai-chat-sidebar" id="sidebar">

        <!-- Top icon row -->
        <div class="sidebar-top-bar">
            <button class="sidebar-icon-btn" id="compose-btn" title="New Chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
            </button>
            <button class="sidebar-icon-btn" id="collapse-sidebar-btn" title="Collapse sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/>
                </svg>
            </button>
        </div>

        <!-- Search -->
        <div class="sidebar-search-wrap">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search-input" class="sidebar-search-input" placeholder="Search chats..." />
        </div>

        <!-- Conversation list -->
        <div class="conversation-list" id="conversation-list">
            <!-- dynamically filled -->
        </div>

        <!-- Bottom user profile -->
        <div class="sidebar-footer">
            <button class="sidebar-footer-mode-btn" id="theme-toggle-btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <span id="theme-label">Light Mode</span>
            </button>
            <div class="sidebar-user">
                <div class="user-avatar">U</div>
                <div class="user-info">
                    <span class="user-name">User</span>
                    <span class="user-plan">Free Plan</span>
                </div>
                <button class="sidebar-icon-btn settings-btn" title="Settings">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ===== MAIN CHAT AREA ===== -->
    <div class="ai-chat-main" id="ai-chat-main">

        <!-- Chat header -->
        <div class="chat-header" id="chat-header">
            <button class="sidebar-icon-btn expand-sidebar-btn" id="expand-sidebar-btn" style="display:none;" title="Show sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/>
                </svg>
            </button>
            <span class="chat-header-icon">✦</span>
            <span id="chat-title">AI Assistant</span>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="empty-state">
            <div class="empty-state-icon">✦</div>
            <h3>AI Assistant</h3>
            <p>Select a conversation or start a new one.</p>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages" style="display:none;"></div>

        <!-- Input container -->
        <div class="chat-input-container" id="input-container" style="display:none;">
            <div class="attachment-previews" id="attachment-previews"></div>
            <input type="file" id="file-input" multiple accept="image/*,.pdf,.doc,.docx,.txt" style="display:none" />
            <div class="chat-input-box">
                <textarea
                    id="user-message"
                    class="chat-textarea"
                    placeholder="Message AI Assistant..."
                    rows="1"
                ></textarea>
                <div class="chat-input-actions">
                    <button class="input-action-btn attach-btn" id="attach-btn" title="Attach file">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                        </svg>
                    </button>
                    <div class="input-right-actions">
                        <!-- Stop button: shown while streaming -->
                        <button class="input-stop-btn" id="stop-btn" title="Stop generating" style="display:none;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="4" y="4" width="16" height="16" rx="2"/>
                            </svg>
                        </button>
                        <!-- Send button: shown when idle -->
                        <button class="input-send-btn" id="send-btn" title="Send">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="chat-disclaimer">AI Assistant can make mistakes. Consider checking important information.</div>
        </div>
    </div>

    <!-- Image lightbox modal -->
    <div class="lightbox-modal" id="lightbox-modal">
        <div class="lightbox-overlay"></div>
        <div class="lightbox-content">
            <span class="lightbox-close" id="lightbox-close">&times;</span>
            <img id="lightbox-image" src="" alt="">
        </div>
    </div>

</div>
