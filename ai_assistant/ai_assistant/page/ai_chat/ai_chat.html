<div class="ai-chat-wrapper">
    <!-- Sidebar -->
    <div class="ai-chat-sidebar" id="sidebar">
        <div class="sidebar-header">
            <input type="text" id="search-input" class="form-control" placeholder="Search..." />
        </div>
        <button class="btn btn-new-chat" id="new-chat-btn">
            + New Chat
        </button>
        <div class="conversation-list" id="conversation-list">
            <!-- dynamically filled -->
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="ai-chat-main">
        <!-- Empty state (shown when no conversation is selected) -->
        <div class="empty-state" id="empty-state">
            <h3>👋 Welcome to AI Assistant</h3>
            <p>Select a conversation or start a new one.</p>
        </div>

        <!-- Fixed chat header (hidden by default) -->
        <div class="chat-header" id="chat-header" style="display:none;">
            <span id="chat-title"></span>
        </div>

        <div class="chat-messages" id="chat-messages" style="display:none;">
            <!-- messages appear here -->
        </div>
        
        <div class="chat-input-container" id="input-container" style="display:none;">
            <!-- Attachment previews (appears above the input) -->
            <div class="attachment-previews" id="attachment-previews"></div>
            <!-- Hidden file input -->
            <input type="file" id="file-input" multiple accept="image/*,.pdf,.doc,.docx,.txt" style="display:none" />
            <div class="chat-input-wrapper">
                <button class="btn btn-icon attach-btn" id="attach-btn" title="Attach file">
                    <i class="icon icon-plus"></i>
                </button>
                <textarea 
                    id="user-message" 
                    class="form-control" 
                    placeholder="Type a message..." 
                    rows="1"
                ></textarea>
                <button class="btn send-btn" id="send-btn" title="Send">
                    <span class="send-arrow">↑</span>
                </button>
            </div>
        </div>
    </div>
        <!-- Image lightbox modal -->
    <div class="lightbox-modal" id="lightbox-modal">
        <div class="lightbox-overlay"></div>
        <div class="lightbox-content">
            <span class="lightbox-close" id="lightbox-close">&times;</span>
            <img id="lightbox-image" src="" alt="">
        </div>
</div>
</div>
